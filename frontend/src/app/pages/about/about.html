<div class="max-w-4xl mx-auto px-4 py-12">
  <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center">Tech Stack</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (tech of techs; track tech.name) {
      <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
        <h3 class="text-lg font-semibold text-indigo-700 mb-2">{{ tech.name }}</h3>
        <p class="text-gray-600 text-sm">{{ tech.description }}</p>
      </div>
    }
  </div>
</div>
