name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.lower.outputs.backend }}
      frontend_image: ${{ steps.lower.outputs.frontend }}
    steps:
      - id: lower
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER_LC}/sample-end-to-end-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${OWNER_LC}/sample-end-to-end-frontend" >> "$GITHUB_OUTPUT"

  build-backend:
    needs: [set-env]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ needs.set-env.outputs.backend_image }}:latest
            ${{ needs.set-env.outputs.backend_image }}:${{ github.sha }}

  build-frontend:
    needs: [set-env]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ needs.set-env.outputs.frontend_image }}:latest
            ${{ needs.set-env.outputs.frontend_image }}:${{ github.sha }}

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags
        working-directory: k8s/overlays/prod
        run: |
          sed -i "s/newTag: latest/newTag: ${{ github.sha }}/g" kustomization.yaml

      - name: Deploy to k3s
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n sample-app --timeout=120s
          kubectl rollout status deployment/frontend -n sample-app --timeout=120s
